<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadgets-industries - Espace Vendeur</title>
    <link rel="stylesheet" href="../user/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header>
        <h1>Gadgets Industries</h1>
        <button class="menu-toggle" aria-label="Menu">&#9776;</button>
        <button id="theme-toggle" class="icon-btn" aria-label="Changer de thème"><i class="ph ph-sun" style="font-size: 1.5rem;"></i></button>
        <div class="nav-overlay"></div>
        
        <div class="top-actions">
            <button id="theme-toggle" class="icon-btn"><i class="ph ph-sun"></i></button>
            <div class="user-profile">
                <div class="avatar">V</div>
                <span class="username">Vendeur</span>
            </div>
            <div class="sidebar-footer">
                <a href="../user/connexion.html" class="logout-btn"><i class="ph ph-sign-out"></i> Déconnexion</a>
            </div>
        </div>
        
    </header>

    <main class="container">
        <section style="width: 100%; max-width: 800px; margin: 2rem auto;">
            <div class="section-header" style="text-align: center; margin-bottom: 3rem;">
                <h2>Soumettre un rapport</h2>
                <p>Rédigez votre rapport journalier des activités ci-dessous.</p>
            </div>
            
            <div class="card form-soumission" style="width: 100%; max-width: 100%;">
                <form action="#" id="rapport-form">
                    <div class="form-group">
                        <label for="rapport-date" style="font-weight: 600;">Date du rapport</label>
                        <input type="date" id="rapport-date" class="form-control" required style="padding: 1rem; font-size: 1rem;">
                    </div>
                    <div class="form-group">
                        <label for="rapport-content" style="font-weight: 600;">Détails du rapport</label>
                        <textarea id="rapport-content" class="form-control" rows="8" placeholder="Ex: Aujourd'hui j'ai visité 3 clients..." required style="padding: 1rem; font-size: 1rem; resize: vertical;"></textarea>
                    </div>
                    <div style="text-align: center; margin-top: 2.5rem;">
                        <button type="button" class="btn btn-primary" onclick="alert('Rapport soumis avec succès !')" style="padding: 1rem 3rem; font-size: 1.1rem; width: 100%;">Soumettre le Rapport</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer-bottom">
            <p>&copy; 2026 Gadgets-industries SARL. Tous droits réservés.</p>
    </footer>

    <script src="../user/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Set today's date automatically
            const dateInput = document.getElementById('rapport-date');
            if(dateInput) {
                dateInput.valueAsDate = new Date();
            }
        });
    </script>
</body>
</html>
