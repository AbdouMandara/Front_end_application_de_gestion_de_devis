<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadgets-industries - Espace Vendeur</title>
    <!-- Use standard user CSS for base styles -->
    <link rel="stylesheet" href="../user/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .vendeur-container {
            max-width: 600px;
            margin: 4rem auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Espace Vendeur</h1>
        <button id="theme-toggle" aria-label="Changer de thème">&#127769;</button>
        <nav>
            <ul style="justify-content: flex-end;">
                <li><a href="../user/index.html">Retour au Site</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="vendeur-container">
            <div class="section-header" style="text-align: left; margin-bottom: 2rem;">
                <h2>Soumettre un rapport</h2>
                <p>Rédigez votre rapport journalier ci-dessous.</p>
            </div>
            
            <div class="card">
                <form action="#" id="rapport-form">
                    <div class="form-group">
                        <label for="rapport-date">Date du rapport</label>
                        <input type="date" id="rapport-date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="rapport-content">Détails du rapport</label>
                        <textarea id="rapport-content" class="form-control" rows="8" placeholder="Ex: Aujourd'hui j'ai visité 3 clients..." required></textarea>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="alert('Rapport soumis avec succès !')" style="width: 100%; margin-top: 1rem;">Soumettre le Rapport</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer-bottom">
            <p>&copy; 2026 Gadgets-industries SARL. Tous droits réservés.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Dark Mode Logic
            const themeToggle = document.getElementById('theme-toggle');
            
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }

            if (themeToggle) {
                themeToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.body.classList.toggle('dark-mode');
                    const isDark = document.body.classList.contains('dark-mode');
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                });
            }

            // Set today's date automatically
            document.getElementById('rapport-date').valueAsDate = new Date();
        });
    </script>
</body>
</html>
