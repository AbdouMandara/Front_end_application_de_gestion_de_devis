<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadgets-industries - Section Solaire</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Gadgets-industries</h1>
                <button class="menu-toggle" aria-label="Menu">&#9776;</button>
        <button id="theme-toggle" aria-label="Changer de thème">&#127769;</button>
        <div class="nav-overlay"></div>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="connexion.html">Connexion</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section style="margin-bottom: 2rem;">
            <h2>Installation Solaire</h2>
            <p>Calculez vos besoins énergétiques et obtenez votre devis solaire.</p>
        </section>

        <!-- Carousel -->
        <div class="carousel">
            <!-- Ici on insèrera les images depuis le JS -->
        </div>

        <div class="card form-soumission">
            <form id="quote-form">
                <div class="box">
                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="tel">Numéro de téléphone</label>
                        <input type="tel" id="tel" class="form-control" required>
                    </div>
                </div>

                <h3>Équipements & Calcul d'Ampérage</h3>
                <div id="products-container" style="margin-top: 1rem;">
                    <!-- ici on mettra les produits depuis le JS -->
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button type="button" id="add-product" class="btn btn-blue">Ajouter un équipement</button>
                    <button type="submit" class="btn btn-primary">Soumettre le devis solaire</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer-bottom">
            <p>&copy; 2026 Gadgets-industries SARL. Tous droits réservés.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
