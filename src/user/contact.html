<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadgets-industries - Contact</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Gadgets-industries</h1>
                <button class="menu-toggle" aria-label="Menu">&#9776;</button>
        <button id="theme-toggle" aria-label="Changer de thème">&#127769;</button>
        <div class="nav-overlay"></div>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="connexion.html">Connexion</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section style="text-align: center; margin-bottom: 3rem;">
            <h2>Contactez-nous</h2>
            <p>Notre équipe est à votre disposition pour toute question ou demande de devis spécifique.</p>
        </section>

        <div style="display: flex;justify-content: center; align-items: center;">
            <div class="card-contact">
                <h3>Envoyez un message</h3>
                <form action="#" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label for="contact-name">Nom</label>
                        <input type="text" id="contact-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="contact-email">Email</label>
                        <input type="email" id="contact-email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" class="form-control" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Envoyer</button>
                </form>
            </div>

        </div>
    </main>

    <footer class="footer-bottom">
            <p>&copy; 2026 Gadgets-industries SARL. Tous droits réservés.</p>
    </footer>
</body>
</html>
