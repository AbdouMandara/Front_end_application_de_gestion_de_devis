<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadgets-industries - Section Électrique</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <header>
        <h1>Gadgets-industries</h1>
                <button class="menu-toggle" aria-label="Menu">&#9776;</button>
        <button id="theme-toggle" class="icon-btn" aria-label="Changer de thème"><i class="ph ph-sun" style="font-size: 1.5rem;"></i></button>
        <div class="nav-overlay"></div>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="connexion.html">Connexion</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section style="margin-bottom: 2rem;">
            <h2>Installation Électrique</h2>
            <p>Remplissez le formulaire pour obtenir votre devis personnalisé.</p>
        </section>

        <!-- Carousel -->
        <div class="carousel">
            <!-- Images will be injected by JS -->
        </div>

        <div class="card form-soumission">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--dark-color);">Formulaire de Devis Électrique</h2>
            <form id="quote-form">
                <div class="box">
                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="tel">Numéro de téléphone</label>
                        <input type="tel" id="tel" class="form-control" required>
                    </div>
                </div>

                <h3>Produits</h3>
                <div id="products-container" style="margin-top: 1rem;">
                    <!-- Rows will be injected by JS -->
                </div>

                <button type="button" id="add-product" class="btn btn-blue">Ajouter un produit</button>
                <div style="margin-top: 2rem; display: flex; gap: 1rem;justify-content: center;">
                    <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.1rem;">Soumettre le devis</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer-bottom">
            <p>&copy; 2026 Gadgets-industries SARL. Tous droits réservés.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
