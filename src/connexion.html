<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadgets-industries - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 6rem auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Gadgets-industries</h1>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="inscription.html">Inscription</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="card auth-container">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--dark-color);">Connexion</h2>
            <form action="#">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Se connecter</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Nouveau ici ? <a href="inscription.html" style="color: var(--blue-color); font-weight: 600; text-decoration: none;">Créer un compte</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Gadgets-industries SARL. Tous droits réservés.</p>
    </footer>
</body>
</html>
